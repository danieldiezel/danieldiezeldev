<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Seite nicht gefunden | Daniel Diezel</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #e82127; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      color: #1c1c1c;
      position: relative;
      user-select: none;
    }
    .code span { color: var(--accent); }
    h1 {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-top: 24px;
      letter-spacing: -0.5px;
    }
    p {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #666;
      max-width: 360px;
      line-height: 1.7;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 36px;
    }
    .btn-primary {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 100px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
    .btn-secondary {
      padding: 12px 28px;
      background: transparent;
      color: #888;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 100px;
      border: 1px solid #282828;
      transition: all 0.2s;
    }
    .btn-secondary:hover { color: #fff; border-color: #444; }
  </style>
</head>
<body>
  <div class="code"><span>4</span>0<span>4</span></div>
  <h1>Seite nicht gefunden</h1>
  <p>Diese Seite existiert nicht oder wurde verschoben. Kein Stress – einfach zurück zur Startseite.</p>
  <div class="actions">
    <a class="btn-primary" href="/de/home.html">Zur Startseite</a>
    <a class="btn-secondary" href="/en/home.html">English</a>
  </div>
</body>
</html>
